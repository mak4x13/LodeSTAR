<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">LodeSTAR operating loop</title>
  <desc id="desc">A clean operating-loop diagram showing how LodeSTAR converts live founder signals into evidence-backed investment decisions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#050706"/>
      <stop offset="0.52" stop-color="#0a1112"/>
      <stop offset="1" stop-color="#12101a"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#71ffd1"/>
      <stop offset="1" stop-color="#d8fff2"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .kicker{font:800 20px Arial,sans-serif;letter-spacing:5px;fill:#71ffd1}
      .headline{font:900 60px Arial,sans-serif;fill:#ffffff}
      .subhead{font:500 24px Arial,sans-serif;fill:#b8b8b8}
      .sectionLabel{font:800 18px Arial,sans-serif;letter-spacing:3px;fill:#71ffd1}
      .sectionTitle{font:900 34px Arial,sans-serif;fill:#ffffff}
      .copy{font:500 21px Arial,sans-serif;fill:#b7b7b7}
      .small{font:700 17px Arial,sans-serif;fill:#9f9f9f}
      .chipText{font:800 18px Arial,sans-serif;fill:#0b1511}
      .card{fill:#151715;stroke:#393d3a;stroke-width:1.6}
      .panel{fill:#101211;stroke:#242a27;stroke-width:1.4}
      .light{fill:#f5f4ee;stroke:#ffffff;stroke-width:1.8}
      .lightTitle{font:900 31px Arial,sans-serif;fill:#080808}
      .lightCopy{font:500 19px Arial,sans-serif;fill:#555555}
      .decision{font:900 30px Arial,sans-serif;fill:#ffffff}
      .divider{stroke:#ffffff;stroke-opacity:.12}
    </style>
  </defs>

  <rect width="1600" height="900" rx="38" fill="url(#bg)"/>
  <rect x="34" y="34" width="1532" height="832" rx="32" fill="none" stroke="#ffffff" stroke-opacity="0.07"/>

  <text x="88" y="98" class="kicker">FOUNDER DISCOVERY OPERATING LOOP</text>
  <text x="88" y="160" class="headline">LodeSTAR turns signals into conviction</text>
  <text x="90" y="205" class="subhead">One investor workspace for sourcing, evidence, memory, and decision-ready memos.</text>
  <line x1="88" y1="248" x2="1512" y2="248" class="divider"/>

  <g id="loop">
    <rect class="panel" x="88" y="302" width="1424" height="426" rx="28"/>

    <rect class="card" x="132" y="346" width="300" height="326" rx="22"/>
    <circle cx="174" cy="389" r="23" fill="#71ffd1" filter="url(#glow)"/>
    <text x="166" y="397" font-family="Arial,sans-serif" font-size="22" font-weight="900" fill="#071b13">1</text>
    <text x="212" y="397" class="sectionLabel">CAPTURE</text>
    <text x="164" y="458" class="sectionTitle">Live founder</text>
    <text x="164" y="498" class="sectionTitle">signals</text>
    <text x="164" y="548" class="copy">GitHub activity</text>
    <text x="164" y="582" class="copy">Tavily web results</text>
    <text x="164" y="616" class="copy">PDF decks and voice</text>

    <rect class="light" x="472" y="346" width="300" height="326" rx="22"/>
    <circle cx="514" cy="389" r="23" fill="#111111"/>
    <text x="506" y="397" font-family="Arial,sans-serif" font-size="22" font-weight="900" fill="#71ffd1">2</text>
    <text x="552" y="397" class="sectionLabel" fill="#16a373">REASON</text>
    <text x="504" y="458" class="lightTitle">Source</text>
    <text x="504" y="506" class="lightTitle">Screen</text>
    <text x="504" y="554" class="lightTitle">Diligence</text>
    <text x="504" y="602" class="lightTitle">Decide</text>
    <text x="642" y="458" class="lightCopy">normalize</text>
    <text x="642" y="506" class="lightCopy">score axes</text>
    <text x="668" y="554" class="lightCopy">verify</text>
    <text x="642" y="602" class="lightCopy">write memo</text>

    <rect class="card" x="812" y="346" width="300" height="326" rx="22"/>
    <circle cx="854" cy="389" r="23" fill="#71ffd1" filter="url(#glow)"/>
    <text x="846" y="397" font-family="Arial,sans-serif" font-size="22" font-weight="900" fill="#071b13">3</text>
    <text x="892" y="397" class="sectionLabel">PROVE</text>
    <text x="844" y="458" class="sectionTitle">Evidence</text>
    <text x="844" y="498" class="sectionTitle">and memory</text>
    <text x="844" y="548" class="copy">Claim provenance</text>
    <text x="844" y="582" class="copy">Trust and gaps</text>
    <text x="844" y="616" class="copy">Supabase traces</text>

    <rect x="1152" y="346" width="316" height="326" rx="22" fill="#0b3a28" stroke="#71ffd1" stroke-width="2.4"/>
    <circle cx="1194" cy="389" r="23" fill="#71ffd1" filter="url(#glow)"/>
    <text x="1186" y="397" font-family="Arial,sans-serif" font-size="22" font-weight="900" fill="#071b13">4</text>
    <text x="1232" y="397" class="sectionLabel">DECIDE</text>
    <text x="1184" y="458" class="sectionTitle">Investment</text>
    <text x="1184" y="498" class="sectionTitle">output</text>
    <text x="1184" y="552" class="decision">Invest</text>
    <text x="1184" y="596" class="decision">Continue review</text>
    <text x="1184" y="640" class="decision">Pass</text>
  </g>

  <g id="chips">
    <rect x="140" y="776" width="202" height="48" rx="24" fill="url(#mint)"/>
    <text x="172" y="807" class="chipText">No mock data</text>
    <rect x="374" y="776" width="260" height="48" rx="24" fill="url(#mint)"/>
    <text x="407" y="807" class="chipText">Every claim cited</text>
    <rect x="666" y="776" width="292" height="48" rx="24" fill="url(#mint)"/>
    <text x="700" y="807" class="chipText">Scores never averaged</text>
    <rect x="990" y="776" width="324" height="48" rx="24" fill="url(#mint)"/>
    <text x="1024" y="807" class="chipText">Live reasoning traces</text>
  </g>

  <text x="1512" y="850" text-anchor="end" class="small">Target: evidence-backed conviction inside 24 hours</text>
</svg>
