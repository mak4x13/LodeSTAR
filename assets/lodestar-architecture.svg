<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="470" viewBox="0 0 1200 470" role="img" aria-labelledby="title desc">
  <title id="title">LodeSTAR system architecture</title>
  <desc id="desc">Founder signals enter an agent pipeline, become verified evidence and persistent memory, and produce an investment decision.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#080808"/><stop offset="1" stop-color="#181818"/></linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#ffffff"/><stop offset="1" stop-color="#8bffca"/></linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0l10 5-10 5z" fill="#8bffca"/></marker>
    <style>
      .label{font:700 12px Arial,sans-serif;letter-spacing:1.5px;fill:#8bffca}.title{font:800 24px Arial,sans-serif;fill:#fff}.copy{font:400 13px Arial,sans-serif;fill:#aaa}.node{fill:#171717;stroke:#414141;stroke-width:1}.core{fill:#f7f7f7;stroke:#fff}.coreTitle{font:800 21px Arial,sans-serif;fill:#0b0b0b}.coreCopy{font:400 12px Arial,sans-serif;fill:#555}.line{fill:none;stroke:url(#signal);stroke-width:2;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="470" rx="18" fill="url(#bg)"/>
  <text x="46" y="53" class="label">FROM RAW SIGNAL TO INVESTMENT CONVICTION</text>
  <text x="46" y="86" class="title">THE LODESTAR DECISION ENGINE</text>
  <line x1="46" y1="111" x2="1154" y2="111" stroke="#343434"/>

  <rect class="node" x="46" y="153" width="205" height="92" rx="10"/><text class="label" x="66" y="180">01 / DISCOVER</text><text class="title" x="66" y="210">Live signals</text><text class="copy" x="66" y="232">GitHub · Tavily · PDF · Voice</text>
  <rect class="node" x="46" y="285" width="205" height="92" rx="10"/><text class="label" x="66" y="312">02 / DEFINE</text><text class="title" x="66" y="342">Investor thesis</text><text class="copy" x="66" y="364">Stage · sector · risk · ownership</text>

  <path class="line" d="M251 199H344"/><path class="line" d="M251 331H302Q320 331 320 313V219Q320 199 344 199"/>
  <rect class="core" x="344" y="153" width="252" height="224" rx="12"/>
  <text class="label" x="368" y="182" fill="#087648">AGENT ORCHESTRATION</text>
  <text class="coreTitle" x="368" y="218">Source</text><text class="coreCopy" x="474" y="218">find candidates</text>
  <line x1="368" y1="235" x2="572" y2="235" stroke="#d4d4d4"/>
  <text class="coreTitle" x="368" y="268">Screen</text><text class="coreCopy" x="474" y="268">score three axes</text>
  <line x1="368" y1="285" x2="572" y2="285" stroke="#d4d4d4"/>
  <text class="coreTitle" x="368" y="318">Diligence</text><text class="coreCopy" x="474" y="318">verify every claim</text>
  <line x1="368" y1="335" x2="572" y2="335" stroke="#d4d4d4"/>
  <text class="coreTitle" x="368" y="365">Decide</text><text class="coreCopy" x="474" y="365">build the memo</text>

  <path class="line" d="M596 211H685"/><path class="line" d="M596 319H685"/>
  <rect class="node" x="685" y="153" width="205" height="116" rx="10"/><text class="label" x="705" y="180">PROOF LAYER</text><text class="title" x="705" y="212">Evidence ledger</text><text class="copy" x="705" y="237">Provenance · trust · gaps</text><text class="copy" x="705" y="256">Contradiction register</text>
  <rect class="node" x="685" y="285" width="205" height="92" rx="10"/><text class="label" x="705" y="312">MEMORY LAYER</text><text class="title" x="705" y="342">Supabase</text><text class="copy" x="705" y="364">Profiles · scores · live traces</text>

  <path class="line" d="M890 211H963"/><path class="line" d="M890 331H925Q943 331 943 313V231Q943 211 963 211"/>
  <rect x="963" y="153" width="191" height="224" rx="12" fill="#0b3627" stroke="#8bffca"/>
  <circle cx="1058" cy="207" r="25" fill="#8bffca" filter="url(#glow)"/><path d="M1047 207l8 8 15-18" fill="none" stroke="#071b13" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text class="label" x="987" y="257">DECISION OUTPUT</text><text class="title" x="987" y="291">Invest</text><text class="title" x="987" y="321">Continue diligence</text><text class="title" x="987" y="351">Pass</text>
  <text x="1154" y="431" text-anchor="end" class="copy">Evidence-backed conviction · target under 24 hours</text>
</svg>
